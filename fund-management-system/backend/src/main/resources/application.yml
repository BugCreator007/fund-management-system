server:
  port: 8080

spring:
  application:
    name: fund-management-backend
  
  datasource:
    url: jdbc:h2:mem:funddb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  
  h2:
    console:
      enabled: true
      path: /h2-console

# CORS配置
cors:
  allowed-origins: http://localhost:3000
